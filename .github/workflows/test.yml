name: Tests

on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run test suite (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # PyQt6 requires these system EGL/GL libraries on headless Ubuntu runners.
      # Without them `from PyQt6.QtWidgets import QApplication` raises:
      #   ImportError: libEGL.so.1: cannot open shared object file
      - name: Install Qt6 system libraries (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libgles2 \
            libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxcb-xkb1

      # PyQt6 is the ONLY supported UI framework (see requirements.txt).
      # Install it here explicitly so it is always present for the test runner.
      - name: Install PyQt6 (required)
        run: |
          python -m pip install --upgrade pip
          pip install "PyQt6>=6.6.0" "PyQt6-Qt6>=6.6.0" "PyQt6-sip>=13.6.0"
          python -c "from PyQt6.QtWidgets import QApplication; print('✅ PyQt6 OK')"

      # Install the rest of the core test-time dependencies (no heavy ML).
      - name: Install test dependencies
        run: |
          pip install "Pillow>=10.0.0" "numpy>=1.24.0" "opencv-python-headless>=4.8.0"
          pip install "PyOpenGL>=3.1.7"
          pip install "onnxruntime>=1.16.0"
          pip install "psutil>=5.9.0" "pyyaml>=6.0" "requests>=2.31.0"
          pip install "scikit-learn>=1.3.0" "scipy>=1.10.0"
          pip install "xxhash>=3.0.0" "tqdm>=4.65.0" "send2trash>=1.8.0"
          pip install "watchdog>=3.0.0" "cryptography>=41.0.0"
          # Optional extras — these enhance the test coverage but are not required
          # for the core UI or import-safety tests.  Failures are non-fatal.
          # timm: enables advanced texture classification tests
          pip install "timm>=0.9.0" || echo "⚠️  timm not installed — advanced classifier tests skipped"
          # QScintilla: enables the Notepad panel code-editor widget tests
          pip install "QScintilla>=2.14.0" || echo "⚠️  QScintilla not installed — notepad panel tests skipped"

      - name: Syntax check
        run: python -m compileall -q .

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONUTF8: "1"
        run: |
          python test_hybrid_architecture.py
          echo "✅ All tests passed"
